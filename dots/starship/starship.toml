# ~/.config/starship.toml

# Tokyo Night themed starship config

add_newline = true

format = """\
[╭╴](#565f89)$env_var\
$all[╰─](#565f89)$character"""

[character]
success_symbol = '[➜](#9ece6a bold)'
error_symbol = '[✗](#f7768e bold) '
vimcmd_symbol = '[ ](#bb9af7 bold)'

[cmd_duration]
format = "[$duration]($style) "
style = "#e0af68"

[aws]
format = '[$symbol($profile )(\($region\) )(\[$duration\] )]($style)'
symbol = '󰸏 '
disabled = true

[username]
style_user = "#7aa2f7 bold"
style_root = "#f7768e bold"
format = " [$user]($style)"
disabled = false
show_always = true

[hostname]
ssh_only = false
format = "-[NixOS](#bb9af7 bold)"
disabled = false

[directory]
style = "#7aa2f7 bold"
truncation_length = 3
truncation_symbol = "…/"
home_symbol = " ~"
read_only_style = "#f7768e"
read_only = "  "
format = "[$path]($style)[$read_only]($read_only_style) "

[git_branch]
style = "#bb9af7"
format = "[$symbol$branch]($style) "
symbol = " "

[git_status]
format = '[\($all_status$ahead_behind\)]($style) '
style = "#9ece6a bold"
conflicted = "🏳"
up_to_date = " "
untracked = " "
ahead = "⇡${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
behind = "⇣${count}"
stashed = " "
modified = " "
staged = '[++\($count\)](bold #e0af68)'
renamed = "襁 "
deleted = " "

[golang]
symbol = " "
style = "#7dcfff"
format = "via [$symbol($version )]($style)"

[terraform]
format = "via [ terraform $version]($style) 壟 [$workspace]($style) "
style = "#bb9af7"

[docker_context]
format = "via [ $context]($style) "
style = "#7aa2f7 bold"

[helm]
format = "via [ $version]($style) "
style = "#bb9af7 bold"

[python]
symbol = " "
python_binary = "python3"
style = "#e0af68"
format = 'via [$symbol$pyenv_prefix($version )(\($virtualenv\) )]($style)'

[nodejs]
format = "via [ $version]($style) "
style = "#9ece6a bold"

[ruby]
format = "via [ $version]($style) "
style = "#f7768e"

[rust]
symbol = " "
style = "#ff9e64"
format = "via [$symbol($version )]($style)"

[bun]
format = '[$symbol($version )]($style)'
symbol = '󰳮 '
style = "#e0af68"

[c]
format = '[$symbol($version(-$name) )]($style)'
symbol = ' '
style = "#7dcfff"

[conda]
format = '[$symbol$environment]($style) '
symbol = ' '
style = "#9ece6a"

[container]
format = '[$symbol\[$name\]]($style) '
symbol = ' '
style = "#7aa2f7"
